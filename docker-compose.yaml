
services:

  log-anomaly:
    build: ./log-anomaly
    ports:
      - "8080:8080"
    depends_on:
      mysql: 
        condition: service_healthy
    env_file:
      - ./log-anomaly/.env

  ml-service:
    build: ./ML-service
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 1m30s
      timeout: 20s
      retries: 5
      start_period: 30s
  
volumes:
  mysql-data: